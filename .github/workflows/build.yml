name: Build FactuposDatafono Windows

# Compila en un runner Windows de GitHub (igual que FactuPOS Print/Backup):
#   1) pkg → FactuposDatafono.exe (Node 18 embebido, autocontenido)
#   2) Inno Setup → FactuposDatafono-Setup.exe (instalador con autostart)
# Ambos quedan como artefactos descargables del run (y del Release si es un tag).

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar .exe (pkg)
        run: npm run build:win        # → dist/FactuposDatafono.exe

      - name: Instalar Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compilar instalador (Inno Setup)
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\FactuposDatafono.iss'

      - name: Subir instalador (Setup.exe)
        uses: actions/upload-artifact@v4
        with:
          name: FactuposDatafono-Setup
          path: installer/Output/FactuposDatafono-Setup-*.exe
          if-no-files-found: error

      - name: Subir .exe crudo
        uses: actions/upload-artifact@v4
        with:
          name: FactuposDatafono-exe
          path: dist/FactuposDatafono.exe
          if-no-files-found: error

      # Si el push es un tag vX.Y.Z, publica un Release con el instalador adjunto.
      - name: Publicar Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/FactuposDatafono-Setup-*.exe
            dist/FactuposDatafono.exe
